server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ────────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                           always;
    add_header X-Frame-Options         "SAMEORIGIN"                        always;
    add_header X-XSS-Protection        "1; mode=block"                     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    # CSP: allow inline scripts/styles (required for Vite-built SPA); restrict everything else to self
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none';" always;

    # ── React Router — serve index.html for all routes ──────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API calls to the backend ──────────────────────────────────────────
    location /api/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Cache static assets ─────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Repeat security headers — nginx only applies add_header in the most specific block
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "SAMEORIGIN" always;
    }

    # ── Compression ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
}
